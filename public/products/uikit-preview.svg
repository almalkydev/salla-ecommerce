<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#C7D2FE"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg)"/>
  <!-- UI Component Grid -->
  <g transform="translate(100, 120)">
    <!-- Nav bar -->
    <rect x="0" y="0" width="600" height="50" rx="12" fill="white" opacity="0.9"/>
    <circle cx="30" cy="25" r="12" fill="#6366F1" opacity="0.8"/>
    <rect x="160" y="18" width="60" height="14" rx="4" fill="#E0E7FF"/>
    <rect x="240" y="18" width="60" height="14" rx="4" fill="#E0E7FF"/>
    <rect x="320" y="18" width="60" height="14" rx="4" fill="#E0E7FF"/>
    <rect x="500" y="12" width="80" height="28" rx="14" fill="#6366F1"/>
    <!-- Card 1 -->
    <rect x="0" y="70" width="280" height="200" rx="16" fill="white" opacity="0.85"/>
    <rect x="20" y="90" width="240" height="100" rx="10" fill="#EEF2FF"/>
    <rect x="20" y="205" width="120" height="14" rx="4" fill="#1E1B4B" opacity="0.6"/>
    <rect x="20" y="230" width="200" height="10" rx="3" fill="#C7D2FE" opacity="0.5"/>
    <!-- Card 2 -->
    <rect x="300" y="70" width="300" height="200" rx="16" fill="white" opacity="0.85"/>
    <rect x="320" y="90" width="260" height="100" rx="10" fill="#F0FDFA"/>
    <rect x="320" y="205" width="130" height="14" rx="4" fill="#1E1B4B" opacity="0.6"/>
    <rect x="320" y="230" width="210" height="10" rx="3" fill="#C7D2FE" opacity="0.5"/>
    <!-- Button row -->
    <rect x="0" y="290" width="140" height="44" rx="22" fill="#6366F1" opacity="0.9"/>
    <rect x="160" y="290" width="140" height="44" rx="22" fill="white" stroke="#6366F1" stroke-width="2" opacity="0.8"/>
    <!-- Input -->
    <rect x="0" y="360" width="600" height="48" rx="12" fill="white" opacity="0.7" stroke="#C7D2FE" stroke-width="1.5"/>
    <rect x="20" y="378" width="180" height="12" rx="3" fill="#CBD5E1" opacity="0.4"/>
    <!-- Stats row -->
    <rect x="0" y="430" width="185" height="120" rx="16" fill="white" opacity="0.85"/>
    <rect x="20" y="460" width="80" height="24" rx="4" fill="#1E1B4B" opacity="0.5"/>
    <rect x="20" y="500" width="140" height="10" rx="3" fill="#C7D2FE" opacity="0.4"/>
    <rect x="205" y="430" width="185" height="120" rx="16" fill="white" opacity="0.85"/>
    <rect x="225" y="460" width="80" height="24" rx="4" fill="#6366F1" opacity="0.5"/>
    <rect x="225" y="500" width="140" height="10" rx="3" fill="#C7D2FE" opacity="0.4"/>
    <rect x="410" y="430" width="190" height="120" rx="16" fill="white" opacity="0.85"/>
    <rect x="430" y="460" width="80" height="24" rx="4" fill="#10B981" opacity="0.5"/>
    <rect x="430" y="500" width="140" height="10" rx="3" fill="#C7D2FE" opacity="0.4"/>
  </g>
</svg>
