<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FAF5FF"/>
      <stop offset="100%" stop-color="#E9D5FF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#bg2)"/>
  <g transform="translate(120, 180)">
    <!-- License card -->
    <rect x="0" y="0" width="560" height="340" rx="24" fill="white" opacity="0.85"/>
    <rect x="0" y="0" width="560" height="340" rx="24" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.3"/>
    <!-- Header stripe -->
    <rect x="0" y="0" width="560" height="80" rx="24" fill="#7C3AED" opacity="0.1"/>
    <rect x="0" y="40" width="560" height="40" fill="#7C3AED" opacity="0.1"/>
    <!-- Logo area -->
    <circle cx="50" cy="40" r="22" fill="#7C3AED" opacity="0.8"/>
    <rect x="84" y="28" width="120" height="12" rx="4" fill="#1E1B4B" opacity="0.6"/>
    <rect x="84" y="48" width="80" height="8" rx="3" fill="#A78BFA" opacity="0.4"/>
    <!-- PRO badge -->
    <rect x="440" y="22" width="80" height="36" rx="18" fill="#7C3AED" opacity="0.9"/>
    <!-- License key display -->
    <rect x="40" y="110" width="480" height="60" rx="12" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="1.5"/>
    <text x="80" y="148" font-family="monospace" font-size="22" fill="#4C1D95" opacity="0.8" letter-spacing="3">XXXX-XXXX-XXXX-9A3F</text>
    <!-- Details -->
    <rect x="40" y="200" width="100" height="10" rx="3" fill="#6D28D9" opacity="0.3"/>
    <rect x="40" y="220" width="200" height="14" rx="4" fill="#1E1B4B" opacity="0.5"/>
    <rect x="40" y="250" width="100" height="10" rx="3" fill="#6D28D9" opacity="0.3"/>
    <rect x="40" y="270" width="160" height="14" rx="4" fill="#1E1B4B" opacity="0.5"/>
    <!-- Activation button -->
    <rect x="340" y="250" width="180" height="48" rx="24" fill="#7C3AED" opacity="0.85"/>
    <!-- Decorative -->
    <circle cx="480" y="200" r="40" fill="#DDD6FE" opacity="0.2"/>
  </g>
  <!-- Floating elements -->
  <circle cx="650" cy="140" r="30" fill="#A78BFA" opacity="0.15"/>
  <circle cx="150" cy="650" r="45" fill="#7C3AED" opacity="0.08"/>
  <rect x="580" y="580" width="120" height="120" rx="20" fill="#E9D5FF" opacity="0.3" transform="rotate(15, 640, 640)"/>
</svg>
